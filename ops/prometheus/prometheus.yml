global:
  scrape_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # api and worker run on the host via `pnpm dev` during development,
  # so Prometheus (in a container) reaches them through host.docker.internal.
  - job_name: api
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:4000"]

  - job_name: worker
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:9100"]
