global:
  scrape_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # api and worker run as containers on the compose network, reachable by
  # service name. For host-based dev (`pnpm dev`), swap these for
  # host.docker.internal:4000 / :9100.
  - job_name: api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:4000"]

  - job_name: worker
    metrics_path: /metrics
    static_configs:
      - targets: ["worker:9100"]
