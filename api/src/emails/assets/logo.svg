  <rect width="30" height="30" rx="8" fill="#ffffff"/>
  <g transform="translate(3 3)" stroke="#0d9488" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M4 17 10 11l3.5 3.5L20 7"/>
    <path d="M15 7h5v5"/>
